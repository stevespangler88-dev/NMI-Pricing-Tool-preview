<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NMI Pricing Tool — Access Required</title>
<link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Public Sans', sans-serif;
  background: linear-gradient(135deg, #32165D 0%, #1a0a3d 100%);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 24px;
}
.card {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(92,221,173,0.25);
  border-radius: 20px;
  padding: 52px 44px;
  max-width: 420px;
  width: 100%;
  text-align: center;
  backdrop-filter: blur(12px);
}
.logo {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 10px;
  margin-bottom: 28px;
}
.logo-text { color: #fff; font-size: 18px; font-weight: 800; letter-spacing: -0.5px; }
.logo-text span { color: #5CDDAD; }
.eyebrow { color: #5CDDAD; font-size: 11px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 10px; }
h1 { color: #fff; font-size: 26px; font-weight: 800; letter-spacing: -0.6px; margin-bottom: 10px; line-height: 1.2; }
.sub { color: rgba(255,255,255,0.55); font-size: 14px; line-height: 1.6; margin-bottom: 32px; }
label { display: block; font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.8px; color: rgba(255,255,255,0.45); margin-bottom: 8px; text-align: left; }
input[type="password"] {
  width: 100%;
  padding: 14px 16px;
  background: rgba(255,255,255,0.08);
  border: 1px solid rgba(255,255,255,0.15);
  border-radius: 12px;
  color: #fff;
  font-family: 'Public Sans', sans-serif;
  font-size: 15px;
  outline: none;
  transition: border-color 0.2s;
  margin-bottom: 16px;
  letter-spacing: 2px;
}
input[type="password"]:focus { border-color: #5CDDAD; }
input[type="password"]::placeholder { letter-spacing: 0; color: rgba(255,255,255,0.3); }
.btn {
  width: 100%;
  padding: 15px;
  background: #5CDDAD;
  color: #32165D;
  border: none;
  border-radius: 12px;
  font-family: 'Public Sans', sans-serif;
  font-size: 15px;
  font-weight: 800;
  cursor: pointer;
  transition: all 0.2s;
  margin-bottom: 12px;
}
.btn:hover { background: #00D37D; transform: translateY(-1px); box-shadow: 0 6px 20px rgba(92,221,173,0.35); }
.error {
  background: rgba(255,113,140,0.12);
  border: 1px solid rgba(255,113,140,0.35);
  color: #FF718C;
  padding: 10px 14px;
  border-radius: 8px;
  font-size: 13px;
  font-weight: 600;
  margin-bottom: 12px;
  display: none;
}
.hint { font-size: 12px; color: rgba(255,255,255,0.3); margin-top: 8px; }
</style>
</head>
<body>
<div class="card">
  <div class="logo">
    <svg width="26" height="26" viewBox="0 0 32 32" fill="none">
      <path d="M4 24L12 8L20 20L24 14L28 24" stroke="#5CDDAD" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
    <span class="logo-text">nmi <span>payments</span></span>
  </div>
  <div class="eyebrow">Internal Tool</div>
  <h1>Partner Pricing<br>Analyzer</h1>
  <p class="sub">This tool is for NMI team members and authorized partners only. Enter the access password to continue.</p>
  <label for="pwInput">Access Password</label>
  <input type="password" id="pwInput" placeholder="Enter password" autocomplete="current-password">
  <div class="error" id="errMsg">Incorrect password. Please try again.</div>
  <button class="btn" onclick="checkPassword()">Unlock Tool →</button>
  <p class="hint">Contact your NMI account manager if you need access.</p>
</div>

<script>
document.getElementById('pwInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') checkPassword();
});

function checkPassword() {
  var pw = document.getElementById('pwInput').value;
  var err = document.getElementById('errMsg');
  err.style.display = 'none';
  if (pw === 'NMI2025') {
    window.location.href = 'tool.html';
  } else {
    err.style.display = 'block';
    document.getElementById('pwInput').value = '';
    document.getElementById('pwInput').focus();
  }
}
</script>
</body>
</html>
